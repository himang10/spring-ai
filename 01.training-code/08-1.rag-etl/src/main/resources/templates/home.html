<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Chat</title>
    <link rel="stylesheet" th:href="@{/css/chat.css}">
    <style>
        .path-selector-area {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .path-selector-area label {
            color: white;
            font-weight: 500;
            font-size: 14px;
            white-space: nowrap;
        }
        
        .path-selector-area select {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .path-selector-area select:hover {
            background: white;
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        .path-selector-area select:focus {
            outline: none;
            border-color: white;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
        }
        
        .chat-container {
            border-radius: 0 0 10px 10px;
        }
        
        .chat-header {
            border-radius: 0;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Advisor 선택 영역 -->
        <div class="path-selector-area">
            <label for="pathSelector">🔀 RAG 선택:</label>
            <select id="pathSelector">
                <option value="/chat/txt">Text Reader</option>
                <option value="/chat/txt-etl">Text Reader (ETL to PGVector)</option>
                <option value="/chat/json">JSON Reader</option>
                <option value="/chat/json-etl">JSON Reader (ETL to PGVector)</option>
                <option value="/chat/html">HTML Reader</option>
                <option value="/chat/html-etl">HTML Reader (ETL to PGVector)</option>
                <option value="/chat/pdf">PDF Reader</option>
                <option value="/chat/pdf-etl">PDF Reader (ETL to PGVector)</option>
                <option value="/chat/docx">DOCX Reader</option>
                <option value="/chat/docx-etl">DOCX Reader (ETL to PGVector)</option>
                <option value="/chat/url">URL Reader</option>
                <option value="/chat/url-etl">URL Reader (ETL to PGVector)</option>
            </select>
        </div>
        
        <!-- 헤더 -->
        <div class="chat-header">
            <h1>Spring AI Chat Memory Demo</h1>
            <div class="header-buttons">
                <button id="newChatBtn" class="btn-icon" title="새 대화">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- 메시지 영역 -->
        <div class="messages" id="messages">
            <div class="welcome-message">
                <h2>👋 Spring AI Chat Memory 데모에 오신 것을 환영합니다!</h2>
                <p>위에서 Chat Memory 방식을 선택하고 질문을 입력해보세요.</p>
            </div>
        </div>
        
        <!-- 입력 영역 -->
        <div class="input-area">
            <form id="chatForm">
                <textarea 
                    id="messageInput" 
                    placeholder="TXT 문서를 로드합니다." 
                    rows="1"
                    autocomplete="off"
                >TXT 문서를 로드합니다.</textarea>
                <button type="submit" id="sendBtn" class="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>
    
    <script th:src="@{/js/chat.js}"></script>
</body>
</html>
