spring:
  application:
    name: spring-ai-sample
  
  # PostgreSQL/PGVector Configuration (commented out)
#  datasource:
#    url: jdbc:postgresql://localhost:5432/postgres
#    username: postgres
#    password: postgres
#    driver-class-name: org.postgresql.Driver
  
  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
      embedding:
        options:
          model: text-embedding-3-small  # 1536 dimensions (기본값)
    
    # PGVector Configuration (commented out)
#    vectorstore:
#      pgvector:
#        initialize-schema: true
#        index-type: HNSW
#        distance-type: COSINE_DISTANCE
#        dimensions: 1536
    
    # Qdrant Configuration
    vectorstore:
      qdrant:
        host: localhost
        port: 6333
        api-key: Skala25a!23$
        collection-name: spring-ai-documents
        use-tls: false
        initialize-schema: true
        distance-type: COSINE
        vector-size: 1536  # OpenAI text-embedding-3-small/ada-002 (다른 모델: Voyage=1024, Cohere=1024/4096)
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

logging:
  level:
    '[org.springframework.ai]': DEBUG
    '[io.netty.resolver.dns]': WARN
    '[com.example.springai.advisor]': DEBUG
    '[com.example.springai]': DEBUG
