spring:
  application:
    name: spring-ai-chat-memory
  
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
    
    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: public
        table-name: rag_vector_store

server:
  port: 8080

logging:
  level:
    "[org.springframework.ai]": DEBUG

weather:
  api:
    key: ${WEATHER_API_KEY}
    base-url: https://api.openweathermap.org
    path: /data/2.5/weather
