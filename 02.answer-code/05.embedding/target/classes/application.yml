spring:
  application:
    name: spring-ai-embedding
  
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          no-store: true
          must-revalidate: true
  
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
    
    vectorstore:
      pgvector:
        initialize-schema: true

server:
  port: 8080

logging:
  level:
    "[org.springframework.ai]": DEBUG
