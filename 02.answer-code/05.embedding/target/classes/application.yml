spring:
  application:
    name: spring-ai-embedding
  
  profiles:
    active: openai
  
  web:
    resources:
      cache:
        cachecontrol:
          no-cache: true
          no-store: true
          must-revalidate: true

server:
  port: 8080

logging:
  level:
    "[org.springframework.ai]": DEBUG
