apiVersion: v1
kind: Service
metadata:
  name: spring-ai-tools
  namespace: skala-practice
  labels:
    app: spring-ai-tools
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app: spring-ai-tools