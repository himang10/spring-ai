apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: langfuse
type: Opaque
data:
  # NextAuth 시크릿 (32자 hex 문자열을 Base64로 인코딩)
  # 생성: openssl rand -hex 32 | base64
  nextauth-secret: Y2hhbmdlLXRoaXMtdG8tYS1zZWN1cmUtcmFuZG9tLXZhbHVl

  # Salt 값 (랜덤 문자열을 Base64로 인코딩)
  # 생성: openssl rand -hex 16 | base64
  salt: Y2hhbmdlLXRoaXMtc2FsdA==

  # PostgreSQL 비밀번호 (Base64로 인코딩)
  # 생성: echo -n "your-password" | base64
  postgres-password: cG9zdGdyZXMtcGFzc3dvcmQ=

  # Redis 비밀번호 (Base64로 인코딩)
  redis-password: cmVkaXMtcGFzc3dvcmQ=

  # 선택 사항: 암호화 키
  # encryption-key: ZW5jcnlwdGlvbi1rZXk=

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: langfuse
type: Opaque
data:
  # PostgreSQL 사용자 이름
  postgres-user: bGFuZ2Z1c2U=  # langfuse

  # PostgreSQL 비밀번호
  postgres-password: cG9zdGdyZXMtcGFzc3dvcmQ=  # postgres-password

  # PostgreSQL 데이터베이스
  postgres-db: bGFuZ2Z1c2U=  # langfuse
