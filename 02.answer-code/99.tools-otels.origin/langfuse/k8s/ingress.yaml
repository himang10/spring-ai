apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: langfuse
  namespace: langfuse
  labels:
    app: langfuse
  annotations:
    # Nginx Ingress 사용 시
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"

    # Cert-manager를 사용한 자동 TLS 인증서 발급 (선택사항)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # Traefik 사용 시 (주석 해제)
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: nginx  # 또는 traefik, haproxy 등
  rules:
    - host: langfuse.example.com  # 실제 도메인으로 변경
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: langfuse
                port:
                  number: 3000

  # TLS 설정 (HTTPS 사용 시)
  tls:
    - hosts:
        - langfuse.example.com  # 실제 도메인으로 변경
      secretName: langfuse-tls  # Cert-manager가 자동 생성하거나 수동으로 생성
