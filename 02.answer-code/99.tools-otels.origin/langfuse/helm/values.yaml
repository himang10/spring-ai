# Langfuse Helm Chart Values
# 이 파일은 Langfuse 배포를 위한 설정 값을 정의합니다.

# Langfuse 애플리케이션 설정
langfuse:
  # 복제본 수
  replicaCount: 1

  image:
    repository: langfuse/langfuse
    tag: "latest"  # 특정 버전을 사용하는 것을 권장 (예: "2.0.0")
    pullPolicy: IfNotPresent

  # 필수 설정: Salt 값 (보안을 위한 랜덤 문자열)
  salt:
    value: "0b025b4e0e878ad3b40237367d5b8763f4cb8fde45c9eab6a97a9649cb8481c0"
    # 또는 기존 시크릿 사용:
    # existingSecret: "langfuse-secret"
    # existingSecretKey: "salt"

  # 필수 설정: NextAuth 시크릿
  # 생성 방법: openssl rand -hex 32
  nextauth:
    url: "https://langfuse.skala25a.project.skala-ai.com"  # Ingress 도메인과 일치
    secret:
      value: "dd9ce11f4a80051ce5fad884f9e238de031d7dedf43fab3fbfce8bde7f90d3cf"  # openssl rand -hex 32로 생성
      # 또는 기존 시크릿 사용:
      # existingSecret: "langfuse-secret"
      # existingSecretKey: "nextauth-secret"

  # 선택 사항: 암호화 키
  encryptionKey:
    value: ""  # 민감 데이터 암호화를 위한 키
    # existingSecret: "langfuse-secret"
    # existingSecretKey: "encryption-key"

  # 환경 변수
  env:
    - name: NODE_ENV
      value: "production"
    - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
      value: "false"

  # 리소스 제한
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # 서비스 설정
  service:
    type: ClusterIP
    port: 3000

  # Ingress 설정
  ingress:
    enabled: true
    className: public-nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - host: langfuse.skala25a.project.skala-ai.com  # 실제 도메인으로 변경
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: langfuse-tls
        hosts:
          - langfuse.skala25a.project.skala-ai.com

# PostgreSQL 설정 (Bitnami 차트)
postgresql:
  enabled: true
  auth:
    username: langfuse
    password: "langfuse"  # 강력한 비밀번호로 변경
    database: langfuse

  primary:
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "gp3"  # 클러스터의 기본 스토리지 클래스 사용

    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # 외부 PostgreSQL 사용 시
  # enabled: false
  # externalPostgresql:
  #   host: "postgres.example.com"
  #   port: 5432
  #   database: "langfuse"
  #   username: "langfuse"
  #   password: "password"

# ClickHouse 설정 (분석 데이터베이스)
clickhouse:
  enabled: true
  auth:
    username: default
    password: "langfuse"  # 강력한 비밀번호로 변경

  persistence:
    enabled: true
    size: 20Gi
    storageClass: "gp3"

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # 외부 ClickHouse 사용 시
  # enabled: false
  # externalClickhouse:
  #   host: "clickhouse.example.com"
  #   port: 8123
  #   database: "langfuse"
  #   username: "default"
  #   password: "password"

# Redis 설정 (캐시 및 세션)
redis:
  enabled: true
  auth:
    enabled: true
    password: "langfuse"  # 강력한 비밀번호로 변경

  master:
    persistence:
      enabled: true
      size: 2Gi
      storageClass: "gp3"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

  # 외부 Redis 사용 시
  # enabled: false
  # externalRedis:
  #   host: "redis.example.com"
  #   port: 6379
  #   password: "password"

# S3/MinIO 설정 (객체 스토리지)
s3:
  enabled: true
  auth:
    rootUser: admin
    rootPassword: "langfuse"  # 강력한 비밀번호로 변경

  persistence:
    enabled: true
    size: 50Gi
    storageClass: "gp3"

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # AWS S3 또는 외부 MinIO 사용 시
  # enabled: false
  # externalS3:
  #   endpoint: "s3.amazonaws.com"
  #   region: "us-east-1"
  #   bucket: "langfuse-data"
  #   accessKeyId: "YOUR_ACCESS_KEY"
  #   secretAccessKey: "YOUR_SECRET_KEY"

# 볼륨 설정
volumes:
  # PVC 템플릿
  persistentVolumeClaim:
    storageClassName: "gp3"  # 클러스터의 기본 스토리지 클래스 사용
    accessModes:
      - ReadWriteOnce

# 보안 컨텍스트
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Pod 보안 컨텍스트
podSecurityContext:
  fsGroup: 1000

# 네트워크 정책
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress

# 모니터링 설정
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s

# 백업 설정
backup:
  enabled: false
  schedule: "0 2 * * *"  # 매일 새벽 2시
  retention: 7  # 7일간 보관
