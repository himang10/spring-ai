apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: langfuse
  labels:
    app: langfuse
spec:
  type: ClusterIP  # LoadBalancer 또는 NodePort로 변경 가능
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
      # nodePort: 30000  # NodePort 사용 시 주석 해제
  selector:
    app: langfuse
