apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-ai-tools
  namespace: default
  annotations:
    # Ingress Controller에 맞게 수정
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # 필요한 경우 추가 annotations
    # nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
  labels:
    app: spring-ai-tools
spec:
  ingressClassName: public-nginx  # Ingress Class 이름 (환경에 맞게 수정)
  rules:
  - host: spring-ai.skala25a.project.skala-ai.com  # 실제 도메인으로 변경
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: spring-ai-tools
            port:
              number: 80
  tls:
  - hosts:
    - spring-ai.skala25a.project.skala-ai.com  # 실제 도메인으로 변경
    secretName: spring-ai-tls  # TLS 인증서 Secret 이름
