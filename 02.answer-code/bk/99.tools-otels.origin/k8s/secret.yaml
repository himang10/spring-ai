apiVersion: v1
kind: Secret
metadata:
  name: spring-ai-secrets
  namespace: default
type: Opaque
stringData:
  # OpenAI API Key
  OPEN_AI_KEY: "your-openai-api-key-here"

  # Weather API Key
  WEATHER_API_KEY: "your-weather-api-key-here"

  # Langfuse - OpenTelemetry Endpoint
  OTEL_EXPORTER_OTLP_ENDPOINT: "https://langfuse.skala25a.project.skala-ai.com/api/public/otel"

  # Langfuse - Authorization Header (Base64 인코딩)
  # 생성 방법: echo -n "pk-lf-YOUR_PUBLIC:sk-lf-YOUR_SECRET" | base64
  # 결과를 "Authorization=Basic <base64_result>" 형태로 입력
  OTEL_EXPORTER_OTLP_HEADERS: "Authorization=Basic <base64-encoded-pk-sk>"

---
# Secret 생성 예시:
#
# 1. 실제 값으로 secret.yaml 파일 수정
# 2. kubectl apply -f k8s/secret.yaml
#
# 또는 명령줄로 직접 생성:
#
# kubectl create secret generic spring-ai-secrets \
#   --from-literal=OPEN_AI_KEY="sk-xxxxx..." \
#   --from-literal=WEATHER_API_KEY="your-weather-key" \
#   --from-literal=OTEL_EXPORTER_OTLP_ENDPOINT="https://langfuse.skala25a.project.skala-ai.com/api/public/otel" \
#   --from-literal=OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $(echo -n 'pk-lf-xxx:sk-lf-xxx' | base64)" \
#   --namespace=default
