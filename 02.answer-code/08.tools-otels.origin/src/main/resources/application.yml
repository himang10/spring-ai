spring:
  application:
    name: spring-ai-chat-memory
  
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  
  ai:
    openai:
      api-key: ${OPEN_AI_KEY}
      embedding:
        options:
          model: text-embedding-3-small
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
          max-tokens: 2000
    
    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: public
        table-name: rag_vector_store

    chat:
      observations:
        log-prompt: true # Include prompt content in tracing (disabled by default for privacy)
        log-completion: true # Include completion content in tracing (disabled by default)

management:
  tracing:
    sampling:
      probability: 1.0 # Sample 100% of requests for full tracing (adjust in production as needed)
  observations:
    annotations:
      enabled: true # Enable @Observed (if you use observation annotations in code)
  # OTLP 설정은 langfuse.* 프로퍼티에서 자동으로 구성됩니다
  # 또는 환경변수로 직접 설정 가능:
  #   OTEL_EXPORTER_OTLP_ENDPOINT
  #   OTEL_EXPORTER_OTLP_HEADERS



server:
  port: 8080

weather:
  api:
    key: ${WEATHER_API_KEY}
    base-url: https://api.openweathermap.org
    path: /data/2.5/weather

logging:
  level:
    "[org.springframework.ai]": DEBUG
    "[io.opentelemetry]": DEBUG
    "[io.micrometer.tracing]": DEBUG

# ============================================
# Langfuse 연동 (OpenTelemetry via 환경변수)
# ============================================
# Langfuse는 OpenTelemetry를 통해 자동으로 연동됩니다.
# 다음 환경변수를 설정하면 자동으로 Langfuse로 트레이스가 전송됩니다:
#
# 1. Langfuse API 키 Base64 인코딩:
#    AUTH=$(echo -n "pk-lf-YOUR_PUBLIC_KEY:sk-lf-YOUR_SECRET_KEY" | base64)
#
# 2. OpenTelemetry 환경변수 설정:
#    export OTEL_EXPORTER_OTLP_ENDPOINT=https://langfuse.skala25a.project.skala-ai.com/api/public/otel
#    export OTEL_EXPORTER_OTLP_HEADERS="Authorization=Basic $AUTH"
#
# 3. 애플리케이션 실행:
#    mvn spring-boot:run
#
# 자세한 설정 방법은 LANGFUSE_SETUP.md 참고
# ============================================
